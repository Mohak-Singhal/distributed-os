[build]
incremental = true

[profile.dev]
opt-level = 0
debug = true
split-debuginfo = "unpacked"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"

[alias]
ck = "check --workspace"
cl = "clippy --workspace --all-targets -- -D warnings"
t  = "test --workspace"
fmt-check = "fmt --all -- --check"
